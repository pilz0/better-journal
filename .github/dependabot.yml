version: 2
updates:
  # Gradle (app-level Kotlin/Java dependencies)
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      androidx:
        patterns:
          - "androidx.*"
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
          - "org.jetbrains.kotlinx:*"
      testing:
        patterns:
          - "io.mockk:*"
          - "app.cash.turbine:*"
          - "com.willowtreeapps.assertk:*"
          - "org.robolectric:*"
          - "org.junit.*"

  # GitHub Actions — Dependabot edits the SHA pin in-place and includes the
  # human-readable tag in the PR title/body.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      actions:
        patterns:
          - "*"
