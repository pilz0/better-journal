---
name: Build and test
on:
  push:
  pull_request:

# Deny all permissions by default; each job grants the minimum required.
permissions: {}

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/') }}

env:
  main_project_module: 'app'
  # Deterministic JVM defaults for tests.
  TZ: 'UTC'
  LANG: 'en_US.UTF-8'

jobs:
  wrapper-validation:
    name: Validate Gradle wrapper
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.13.1
        with:
          egress-policy: audit

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.1.0
        with:
          persist-credentials: false

      # The wrapper validation lives inside the gradle/actions monorepo since v3.
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4.4.4

  test:
    name: Run Unit Tests (${{ matrix.test-suite }})
    runs-on: ubuntu-latest
    needs: [ wrapper-validation ]
    permissions:
      contents: read
      checks: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - test-suite: data
            test-args: '--tests "foo.pilz.freaklog.data.*"'
          - test-suite: ui
            test-args: '--tests "foo.pilz.freaklog.ui.*"'
          - test-suite: misc
            # Run everything that is NOT in the data.* or ui.* packages so that
            # newly-added top-level (or other-package) tests are not silently
            # skipped by an overly narrow filter such as `Test*`.
            test-args: '-PtestExclude=foo.pilz.freaklog.data.*,foo.pilz.freaklog.ui.*'
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.13.1
        with:
          egress-policy: audit

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.1.0
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.7.1
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4.4.4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest ${{ matrix.test-args }} --no-daemon

      - name: Publish JUnit results
        # action-junit-report requires `checks: write`, but PRs from forks always get a
        # read-only GITHUB_TOKEN. Skip the check publication on fork PRs to avoid 403s;
        # the raw XML is still uploaded as an artifact in the next step.
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: mikepenz/action-junit-report@3585e9575db828022551b4231f165eb59a0e74e3 # v5.6.2
        with:
          report_paths: 'app/build/test-results/testDebugUnitTest/*.xml'
          check_name: Unit Test Results (${{ matrix.test-suite }})
          require_tests: true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-results-${{ matrix.test-suite }}
          path: |
            app/build/reports/tests/
            app/build/test-results/

  coverage:
    name: Coverage report
    runs-on: ubuntu-latest
    needs: [ wrapper-validation ]
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.13.1
        with:
          egress-policy: audit

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.1.0
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.7.1
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4.4.4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Generate Kover XML + HTML reports
        run: ./gradlew :app:koverXmlReportDebug :app:koverHtmlReportDebug --no-daemon

      # Fail the job if coverage falls below the threshold defined in app/build.gradle.kts.
      - name: Verify coverage thresholds
        run: ./gradlew :app:koverVerifyDebug --no-daemon

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-report
          path: |
            app/build/reports/kover/
            app/build/reports/kover/htmlDebug/

  detekt:
    name: Detekt
    runs-on: ubuntu-latest
    needs: [ wrapper-validation ]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.13.1
        with:
          egress-policy: audit

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.1.0
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.7.1
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4.4.4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run Detekt
        run: ./gradlew detekt --no-daemon

      - name: Upload Detekt SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@865f5f5c36632f18690a3d569fa0a764f2da0c3e # v3.30.9
        with:
          sarif_file: app/build/reports/detekt/detekt.sarif
          category: detekt
        # SARIF upload requires `security-events: write`, which is read-only on fork PRs;
        # tolerate that failure so fork PRs don't go red on the upload step alone.
        continue-on-error: true

      - name: Upload Detekt reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: detekt-reports
          path: app/build/reports/detekt/

  lint:
    name: Android Lint
    runs-on: ubuntu-latest
    needs: [ wrapper-validation ]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.13.1
        with:
          egress-policy: audit

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.1.0
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.7.1
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4.4.4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run Android Lint
        run: ./gradlew :app:lintDebug --no-daemon

      - name: Upload Lint SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@865f5f5c36632f18690a3d569fa0a764f2da0c3e # v3.30.9
        with:
          sarif_file: app/build/reports/lint-results-debug.sarif
          category: android-lint
        continue-on-error: true

      - name: Upload Lint reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lint-reports
          path: app/build/reports/lint-results-*.*

  build-app:
    name: Build (${{ matrix.app-type }})
    runs-on: ubuntu-latest
    needs: [ wrapper-validation ]
    permissions:
      contents: read
    strategy:
      matrix:
        app-type: [ apk, aab ]
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.13.1
        with:
          egress-policy: audit

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.1.0
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.7.1
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4.4.4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build APK
        if: matrix.app-type == 'apk'
        run: ./gradlew assembleRelease --no-daemon

      - name: Build AAB
        if: matrix.app-type == 'aab'
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload unsigned APK
        if: matrix.app-type == 'apk'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: freaklog-unsigned-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload unsigned AAB
        if: matrix.app-type == 'aab'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: freaklog-unsigned-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

  # Aggregator job whose status can be used as a single required check in
  # branch protection.
  ci-passed:
    name: CI passed
    runs-on: ubuntu-latest
    needs: [ wrapper-validation, test, coverage, detekt, lint, build-app ]
    if: always()
    permissions: {}
    steps:
      - name: Verify all upstream jobs succeeded
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more required jobs failed or were cancelled."
            exit 1
          fi
