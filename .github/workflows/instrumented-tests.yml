---
name: Instrumented Tests
on:
  workflow_dispatch:
    inputs:
      api-level:
        description: 'Android API level for the emulator'
        required: false
        default: '34'
        type: choice
        options:
          - '30'
          - '31'
          - '32'
          - '33'
          - '34'
          - '35'
  pull_request:
    types: [ labeled, synchronize ]
  schedule:
    # Nightly run on main, 03:42 UTC, to catch flakes and emulator regressions.
    - cron: '42 3 * * *'

# Deny all permissions by default; each job grants the minimum required.
permissions: {}

concurrency:
  group: instrumented-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  androidTest:
    # Run on workflow_dispatch, scheduled (nightly), OR on PRs that carry the
    # `run-instrumented-tests` label.
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' &&
        contains(github.event.pull_request.labels.*.name, 'run-instrumented-tests'))
    name: Connected Android Tests (API ${{ matrix.api-level }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # On workflow_dispatch, use the user-supplied API level; otherwise run
        # the supported floor (minSdk = 31) and the current target (35) in
        # parallel for broad coverage.
        api-level: >-
          ${{ github.event_name == 'workflow_dispatch' &&
              fromJSON(format('[{0}]', inputs.api-level)) ||
              fromJSON('[31, 34, 35]') }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.13.1
        with:
          egress-policy: audit

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.1.0
        with:
          persist-credentials: false

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.7.1
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4.4.4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: AVD cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}-v1

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.34.0
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.34.0
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest --no-daemon

      - name: Upload androidTest results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: android-test-results-api${{ matrix.api-level }}
          path: |
            app/build/reports/androidTests/
            app/build/outputs/androidTest-results/
