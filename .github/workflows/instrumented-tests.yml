---
name: Instrumented Tests
on:
  workflow_dispatch:
    inputs:
      api-level:
        description: 'Android API level for the emulator'
        required: false
        default: '34'
        type: choice
        options:
          - '30'
          - '31'
          - '32'
          - '33'
          - '34'
          - '35'
  pull_request:
    types: [ labeled, synchronize ]

permissions:
  contents: read

concurrency:
  group: instrumented-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  androidTest:
    # Run on workflow_dispatch, OR on PRs that carry the `run-instrumented-tests` label.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
        contains(github.event.pull_request.labels.*.name, 'run-instrumented-tests'))
    name: Connected Android Tests (API ${{ matrix.api-level }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        # On workflow_dispatch, use the user-supplied API level; otherwise run a fixed default set.
        api-level: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('[{0}]', inputs.api-level)) || fromJSON('[34]') }}
    steps:
      - uses: actions/checkout@v5

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: google_apis
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest --no-daemon

      - name: Upload androidTest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results-api${{ matrix.api-level }}
          path: |
            app/build/reports/androidTests/
            app/build/outputs/androidTest-results/
