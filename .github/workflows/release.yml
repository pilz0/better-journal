---
# Sign and publish release artifacts.
#
# This workflow is intentionally split from `build.yml` so that pull-request
# builds (which do NOT receive secrets) cannot ever execute steps that handle
# the signing key, Cloudflare R2 credentials, or the Google Play service
# account. It is only ever triggered by:
#   1. A successful `Build and test` workflow run on `refs/heads/main`, or a
#      tagged push (handled by the `workflow_run` trigger), AND
#   2. Manually via `workflow_dispatch`.
#
# Secret-consuming jobs are pinned to GitHub Environments (`internal-track`,
# `production`) so that the repository owner can require manual approval and
# scope secrets per environment.
name: Sign and publish

on:
  workflow_run:
    workflows: [ "Build and test" ]
    types: [ completed ]
    # Note: do NOT use `branches:` here. The `branches` filter only matches
    # the upstream run's `head_branch` against branch names — for tag pushes,
    # `head_branch` is the tag short name (e.g. `v1.2.3`), not a branch, so a
    # `branches: [ main ]` filter would silently drop every tag release. The
    # `preconditions` job below performs the actual gating using the API.
  workflow_dispatch:
    inputs:
      upstream-run-id:
        description: >-
          Run ID of the `Build and test` workflow whose unsigned artifacts
          should be signed and released. Find it in the URL of the run page
          (e.g. https://github.com/<owner>/<repo>/actions/runs/<RUN_ID>).
        required: true
        type: string

# Deny all permissions by default; each job grants the minimum required.
permissions: {}

concurrency:
  group: release-${{ github.workflow }}-${{ github.event.workflow_run.head_sha || inputs.upstream-run-id }}
  cancel-in-progress: false

jobs:
  # Re-run the release pipeline only when the upstream build was successful
  # AND the build was for the default branch or a tag. We have to look the
  # upstream run up via the API because the `workflow_run` payload doesn't
  # tell us whether `head_branch` is a branch name or a tag name.
  preconditions:
    name: Check preconditions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      upstream-run-id: ${{ steps.resolve.outputs.upstream-run-id }}
      head-sha: ${{ steps.resolve.outputs.head-sha }}
      is-tag: ${{ steps.resolve.outputs.is-tag }}
      tag-name: ${{ steps.resolve.outputs.tag-name }}
      should-release: ${{ steps.resolve.outputs.should-release }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.13.1
        with:
          egress-policy: audit

      - id: resolve
        name: Resolve upstream run + tag context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_RUN_ID: ${{ inputs.upstream-run-id }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            run_id="$DISPATCH_RUN_ID"
          else
            run_id="$WORKFLOW_RUN_ID"
          fi

          # Pull the canonical run metadata via the API. `head_branch` is the
          # ref short name (branch *or* tag); `head_sha` is the commit SHA.
          run_json="$(gh api "/repos/$GH_REPO/actions/runs/$run_id")"
          head_branch="$(jq -r '.head_branch' <<<"$run_json")"
          head_sha="$(jq -r '.head_sha' <<<"$run_json")"
          conclusion="$(jq -r '.conclusion' <<<"$run_json")"

          if [ "$conclusion" != "success" ]; then
            echo "::error::Upstream run $run_id did not succeed (conclusion=$conclusion)" >&2
            exit 1
          fi

          # Fetch the repository's default branch so we don't hard-code `main`.
          default_branch="$(gh api "/repos/$GH_REPO" --jq .default_branch)"

          # Detect whether `head_branch` names a tag at `head_sha`. If so this
          # is a tag release; otherwise it must be the default branch.
          is_tag=false
          tag_name=
          if gh api "/repos/$GH_REPO/git/refs/tags/$head_branch" >/dev/null 2>&1; then
            tag_sha="$(gh api "/repos/$GH_REPO/git/refs/tags/$head_branch" --jq .object.sha)"
            # Lightweight tags point straight at the commit; annotated tags
            # point at a tag object whose `.object.sha` is the commit.
            if [ "$tag_sha" = "$head_sha" ]; then
              is_tag=true
              tag_name="$head_branch"
            else
              tag_obj="$(gh api "/repos/$GH_REPO/git/tags/$tag_sha" 2>/dev/null || true)"
              if [ -n "$tag_obj" ] && [ "$(jq -r '.object.sha' <<<"$tag_obj")" = "$head_sha" ]; then
                is_tag=true
                tag_name="$head_branch"
              fi
            fi
          fi

          if [ "$is_tag" != "true" ] && [ "$head_branch" != "$default_branch" ]; then
            # Build and test runs on every push (including PR branches), so the
            # workflow_run trigger fires here for branches we never want to
            # release. Treat those as a clean skip rather than a hard failure
            # so the workflow run shows up green; downstream jobs are gated on
            # `should-release` below.
            echo "::notice::Skipping release: head_branch=$head_branch is neither the default branch ($default_branch) nor a tag."
            {
              echo "should-release=false"
              echo "upstream-run-id=$run_id"
              echo "head-sha=$head_sha"
              echo "is-tag=$is_tag"
              echo "tag-name=$tag_name"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "should-release=true"
            echo "upstream-run-id=$run_id"
            echo "head-sha=$head_sha"
            echo "is-tag=$is_tag"
            echo "tag-name=$tag_name"
          } >> "$GITHUB_OUTPUT"

  sign:
    name: Sign (${{ matrix.app-type }})
    needs: [ preconditions ]
    if: needs.preconditions.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    # Secrets are scoped to the `signing` environment, which can be configured
    # in the repo settings to require manual approval for tagged releases.
    environment: signing
    permissions:
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        app-type: [ apk, aab ]
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.13.1
        with:
          egress-policy: audit

      - name: Download unsigned file from upstream build
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: freaklog-unsigned-${{ matrix.app-type }}
          # Pull from the upstream `Build and test` workflow run resolved by
          # the preconditions job. This works for both `workflow_run` and
          # `workflow_dispatch` events.
          run-id: ${{ needs.preconditions.outputs.upstream-run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Android SDK build-tools
        run: |
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager "build-tools;35.0.0"

      - name: Sign artifact
        # Pinned to a specific commit (rather than @nightly) for supply-chain safety.
        uses: ilharp/sign-android-release@13dd52242698526f951aa8bb8696204f6fea702a # v2.0.0
        id: sign
        with:
          releaseDir: .
          signingKey: ${{ secrets.KEYSTORE }}
          keyAlias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.SIGNING_STORE_PASSWORD }}
          keyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
          buildToolsVersion: 35.0.0

      - name: Rename signed file
        run: |
          mv "${{ steps.sign.outputs.signedFile }}" "freaklog.${{ matrix.app-type }}"

      - name: Upload signed artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: freaklog-${{ matrix.app-type }}
          path: freaklog.${{ matrix.app-type }}
          if-no-files-found: error

  attest:
    name: Attest build provenance
    needs: [ preconditions, sign ]
    if: needs.preconditions.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    permissions:
      # Required by `actions/attest-build-provenance` to mint OIDC tokens
      # and write the attestation to the repository.
      id-token: write
      contents: read
      attestations: write
      actions: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.13.1
        with:
          egress-policy: audit

      - name: Download signed artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          path: signed
          pattern: freaklog-*

      - name: Generate SLSA build provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2.4.1
        with:
          subject-path: |
            signed/freaklog-apk/freaklog.apk
            signed/freaklog-aab/freaklog.aab

  upload-s3:
    name: Upload to Cloudflare R2 (${{ matrix.app-type }})
    needs: [ preconditions, sign ]
    if: needs.preconditions.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      actions: read
    strategy:
      matrix:
        app-type: [ apk, aab ]
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.13.1
        with:
          egress-policy: audit

      - name: Download signed artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: freaklog-${{ matrix.app-type }}
          path: ${{ matrix.app-type }}s

      - name: Upload to R2
        # Pinned to a specific commit (rather than @latest) for supply-chain safety.
        uses: ryand56/r2-upload-action@b801a390acbdeb034c5e684ff5e1361c06639e7c # v1.4
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ secrets.R2_BUCKET }}
          source-dir: ${{ matrix.app-type }}s
          destination-dir: ${{ matrix.app-type }}s
          keep-file-fresh: true

  upload-google-play:
    name: Upload to Google Play
    needs: [ preconditions, sign ]
    if: needs.preconditions.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    # `internal-track` should be configured to NOT require approval; promotion
    # to a `production` track environment can be added later for staged
    # rollout.
    environment: internal-track
    permissions:
      contents: read
      actions: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.13.1
        with:
          egress-policy: audit

      - name: Download signed AAB
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: freaklog-aab
          path: app

      - name: Upload to Google Play (internal track)
        uses: r0adkll/upload-google-play@935ef9c68bb393a8e6116b1575626a7f5be3a7fb # v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: foo.pilz.freaklog
          releaseFiles: app/freaklog.aab
          track: internal

  create-release:
    name: Create GitHub release
    needs: [ preconditions, sign, attest ]
    if: needs.preconditions.outputs.is-tag == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      actions: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.13.1
        with:
          egress-policy: audit

      - name: Download signed artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          path: .
          pattern: freaklog-*

      - name: Create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.4.0
        with:
          # `workflow_run` workflows execute on the default branch ref even when
          # the upstream build was for a tag, so pass the resolved upstream tag
          # explicitly instead of relying on GITHUB_REF.
          tag_name: ${{ needs.preconditions.outputs.tag-name }}
          # Only ship the signed, attested artifacts. Unsigned APK/AAB are
          # available as workflow artifacts on the upstream build run for
          # debugging but are not published to end users.
          files: |
            freaklog-apk/freaklog.apk
            freaklog-aab/freaklog.aab
          fail_on_unmatched_files: true
          make_latest: true
          generate_release_notes: true
